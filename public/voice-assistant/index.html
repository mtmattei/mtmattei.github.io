<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Voice Assistant — machine motion prototype</title>
<style>
  :root{ --bg:#08080a; --ink:#f2efe9; --dim:rgba(242,239,233,.42); --faint:rgba(242,239,233,.16); --warm:#f5d8a6; }
  *{box-sizing:border-box} html,body{height:100%}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:"Segoe UI Variable Display","Segoe UI",system-ui,-apple-system,sans-serif;
    overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;
    background:
      radial-gradient(120% 65% at 50% 40%, rgba(255,255,255,.035), transparent 62%),
      radial-gradient(52% 14% at 50% 86%, rgba(255,248,235,.055), transparent 72%);
  }
  header{position:relative;z-index:2;display:flex;align-items:center;gap:14px;padding:26px 32px}
  .mark{display:block;opacity:.5}
  .wordmark{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);font-weight:500}

  main{position:relative;z-index:1;flex:1;display:grid;place-items:center}
  .stage{position:relative;width:100%;max-width:1100px;height:min(64vh,560px)}
  .status{
    position:absolute;left:0;right:0;top:5%;text-align:center;padding:0 24px;
    font-size:clamp(19px,2.5vw,29px);font-weight:400;line-height:1.35;
    transition:opacity .3s ease, transform .3s cubic-bezier(.2,.7,.2,1), filter .3s ease;
  }
  .status.swap{opacity:0;transform:translateY(6px);filter:blur(4px)}
  /* machine mode: no easing anywhere, caption cuts instead of fading */
  body.machine .status{transition:none}
  body.machine .status.swap{opacity:0;transform:none;filter:none}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

  footer{position:relative;z-index:2;display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap;padding:0 24px 30px}
  button{
    appearance:none;background:transparent;color:var(--dim);border:1px solid var(--faint);
    border-radius:999px;padding:9px 16px;font:inherit;font-size:10.5px;letter-spacing:.18em;
    text-transform:uppercase;cursor:pointer;transition:color .2s,border-color .2s,background .2s;
  }
  button:hover{color:var(--ink);border-color:rgba(242,239,233,.34)}
  button[aria-pressed="true"]{color:#08080a;background:var(--ink);border-color:var(--ink)}
  button:focus-visible{outline:2px solid var(--warm);outline-offset:3px}
  #motion{border-radius:3px;border-color:rgba(242,239,233,.3)}
  .hint{width:100%;text-align:center;color:rgba(242,239,233,.22);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;margin-top:6px}
  @media (prefers-reduced-motion:reduce){.status{transition:none}}
  /* billboard framing: on the 934x442 panel the brand row and the control
     pills are chrome around the thing worth looking at. Both go; the wave
     takes the whole screen. The lab page keeps them at full size. */
  body.billboard header,
  body.billboard footer{display:none}
  body.billboard main{padding:0}
  body.billboard .stage{height:100%;max-width:none}
</style>
</head>
<body>

<header>
  <svg class="mark" width="34" height="20" viewBox="0 0 34 20" aria-hidden="true">
    <g stroke="#f2efe9" stroke-width="1.4" stroke-linecap="round">
      <line x1="3" y1="7" x2="3" y2="13"/><line x1="8" y1="3" x2="8" y2="17"/>
      <line x1="13" y1="1.5" x2="13" y2="18.5"/><line x1="18" y1="4" x2="18" y2="16"/>
      <line x1="23" y1="6" x2="23" y2="14"/><line x1="28" y1="8.5" x2="28" y2="11.5"/>
    </g>
  </svg>
  <span class="wordmark">Voice Assistant</span>
</header>

<main>
  <div class="stage">
    <div class="status" id="status" role="status" aria-live="polite">Listening…</div>
    <canvas id="wave"></canvas>
  </div>
</main>

<footer>
  <button data-state="idle">Idle</button>
  <button data-state="listening" aria-pressed="true">Listening</button>
  <button data-state="thinking">Thinking</button>
  <button data-state="speaking">Speaking</button>
  <button id="motion">Motion: Organic</button>
  <button id="mic">Use mic</button>
  <div class="hint" id="hint">Space cycles states · 1–4 jumps directly · M toggles motion model</div>
</footer>

<script>
(() => {
  const cv = document.getElementById('wave');
  const ctx = cv.getContext('2d');
  const statusEl = document.getElementById('status');
  const hintEl = document.getElementById('hint');
  const motionBtn = document.getElementById('motion');
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

  const BARS = 31;
  const ORDER = ['idle','listening','thinking','speaking'];

  const VIS = {
    AA:{open:1.00, wide:0.62, round:0.00},
    EH:{open:0.60, wide:0.82, round:0.00},
    EE:{open:0.26, wide:1.00, round:0.00},
    OH:{open:0.70, wide:0.22, round:0.62},
    OO:{open:0.30, wide:0.04, round:1.00},
    UH:{open:0.44, wide:0.56, round:0.12},
    L :{open:0.38, wide:0.62, round:0.00},
    FV:{open:0.14, wide:0.72, round:0.08},
    MM:{open:0.02, wide:0.50, round:0.18},
    REST:{open:0.05,wide:0.46, round:0.10}
  };
  const VOWELS = ['AA','EH','EE','OH','OO','UH'];
  const CONS   = ['MM','FV','L'];
  const PHRASES = [
    "It’s 4 degrees in Montréal, clearing by noon.",
    "Your first meeting moved to ten fifteen.",
    "I found three flights under six hundred.",
    "Added milk, coffee and lemons to the list."
  ];

  // ---- motion model -------------------------------------------------------
  // organic: continuous easing, jaw inertia, round caps
  // machine: everything lands on a 12 Hz clock, quantised to discrete steps
  let machine = false;
  const CLOCK = 1000/12;          // transport step, 83.3 ms
  const SAMPLE = 1000/20;         // sample-and-hold rate for the bars
  const LEVELS = 7;               // quantisation steps for open/wide/round
  const ROWS = 9;                 // vertical unit grid for bar lengths
  const q = (v,n) => Math.round(v*n)/n;

  let state='listening', energy=0.5, warmth=0.6;
  const s = { open:0.55, wide:0.55, round:0.00, smile:0.55 };
  const bars = Array.from({length:BARS},(_,i)=>({v:0,phase:Math.random()*Math.PI*2,rate:1.5+Math.random()*2.1,seed:i*0.618}));
  let lastSample = 0, tick = 0, glitchUntil = 0, nextGlitch = 2200, glitchSeed = 0;

  let cue = {vis:'REST', until:0}, phraseIdx = 0, phraseLeft = 0, gapBeats = 0;

  function nextCue(now){
    const unit = machine ? CLOCK : 1;
    if (gapBeats > 0){ gapBeats--; cue = {vis:'REST', until: now + (machine ? CLOCK*2 : 90)}; return; }
    if (phraseLeft <= 0){
      phraseIdx = (phraseIdx+1) % PHRASES.length;
      phraseLeft = 7 + Math.floor(Math.random()*5);
      say(PHRASES[phraseIdx]);
      cue = {vis:'REST', until: now + (machine ? CLOCK*4 : 380)};
      return;
    }
    if (cue.vis==='REST' || VOWELS.includes(cue.vis)){
      cue = { vis: CONS[(Math.random()*CONS.length)|0],
              until: now + (machine ? CLOCK : 55 + Math.random()*55) };
    } else {
      cue = { vis: VOWELS[(Math.random()*VOWELS.length)|0],
              until: now + (machine ? CLOCK*(1 + ((Math.random()*2)|0)) : 120 + Math.random()*150) };
      phraseLeft--;
      if (phraseLeft===0) gapBeats = machine ? 3 : 4;
    }
  }

  function say(text){
    statusEl.classList.add('swap');
    setTimeout(()=>{ statusEl.textContent=text; statusEl.classList.remove('swap'); }, (reduce||machine)?0:300);
  }

  let W=0,H=0;
  const fit=()=>{const r=cv.getBoundingClientRect(),dpr=Math.min(devicePixelRatio||1,2);
    W=r.width;H=r.height;cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);};
  addEventListener('resize',fit);

  let analyser=null, freq=null;
  document.getElementById('mic').addEventListener('click', async(e)=>{
    if (analyser) return;
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const ac=new (window.AudioContext||window.webkitAudioContext)();
      analyser=ac.createAnalyser(); analyser.fftSize=128; analyser.smoothingTimeConstant=.8;
      ac.createMediaStreamSource(stream).connect(analyser);
      freq=new Uint8Array(analyser.frequencyBinCount);
      e.target.textContent='Mic live'; e.target.setAttribute('aria-pressed','true'); setState('listening');
    }catch{ hintEl.textContent='Mic unavailable here — running on simulated input'; }
  });

  const LABEL={idle:'Tap to speak', listening:'Listening…', thinking:'Thinking…'};
  function setState(next){
    if (next===state) return;
    state=next;
    document.querySelectorAll('[data-state]').forEach(b=>b.setAttribute('aria-pressed',String(b.dataset.state===next)));
    if (next==='speaking'){ phraseLeft=0; gapBeats=0; cue={vis:'REST', until:performance.now()+120}; }
    else say(LABEL[next]);
  }
  document.querySelectorAll('[data-state]').forEach(b=>b.addEventListener('click',()=>setState(b.dataset.state)));

  function setMotion(on){
    machine = on;
    document.body.classList.toggle('machine', on);
    motionBtn.textContent = on ? 'Motion: Machine' : 'Motion: Organic';
    motionBtn.setAttribute('aria-pressed', String(on));
  }
  motionBtn.addEventListener('click', ()=>setMotion(!machine));
  addEventListener('keydown',ev=>{
    if (ev.code==='Space'){ ev.preventDefault(); setState(ORDER[(ORDER.indexOf(state)+1)%4]); }
    if (ev.key==='m'||ev.key==='M') setMotion(!machine);
    const n=+ev.key; if(n>=1&&n<=4) setState(ORDER[n-1]);
  });

  const lerp=(a,b,k)=>a+(b-a)*k;
  function taper(u){const a=Math.abs(u);return Math.max(0,1-Math.pow(a,1.25))*(1-0.25*Math.pow(a,6));}

  const NONSPEECH={
    idle:      {open:0.06,wide:0.46,round:0.10,smile:0.30},
    listening: {open:0.62,wide:0.60,round:0.00,smile:0.55},
    thinking:  {open:0.20,wide:0.30,round:0.85,smile:0.10}
  };

  function frame(now){
    const t=now/1000, cx=W/2;
    const sampled = now - lastSample >= SAMPLE;
    if (sampled) lastSample = now;
    if (machine && now > nextGlitch){                       // periodic transport artefact
      glitchUntil = now + CLOCK; nextGlitch = now + 1800 + Math.random()*2600; glitchSeed = Math.random()*1000;
    }
    const glitching = machine && now < glitchUntil;

    if (state==='speaking'){
      if (now >= cue.until) nextCue(now);
      const v = VIS[cue.vis];
      if (machine){
        // no inertia: the shape jumps to a quantised target and holds until the next tick
        s.open  = q(v.open, LEVELS);
        s.wide  = q(v.wide, LEVELS);
        s.round = q(v.round, 4);
        s.smile = q(0.35 + 0.55*v.wide, 4);
        energy  = q(0.25 + 0.75*s.open, LEVELS);
      } else {
        s.open  = lerp(s.open, v.open, v.open < s.open ? 0.42 : 0.19);
        s.wide  = lerp(s.wide, v.wide, 0.20);
        s.round = lerp(s.round, v.round, 0.22);
        s.smile = lerp(s.smile, 0.35+0.55*v.wide, 0.15);
        energy  = lerp(energy, 0.25+0.75*s.open, 0.30);
      }
    } else {
      const tgt=NONSPEECH[state], k=reduce?1:(machine?1:0.07);
      s.open=lerp(s.open,tgt.open,k); s.wide=lerp(s.wide,tgt.wide,k);
      s.round=lerp(s.round,tgt.round,k); s.smile=lerp(s.smile,tgt.smile,k);
      let d;
      if (analyser && state==='listening'){
        analyser.getByteFrequencyData(freq); let sum=0; for(let i=0;i<24;i++) sum+=freq[i];
        d=Math.min(1,(sum/24/255)*2.2);
      } else if (state==='idle')   d=0.06+0.04*Math.sin(t*0.85);
      else if (state==='thinking') d=0.34+0.10*Math.sin(t*2.3);
      else                         d=0.30+0.55*Math.max(0,Math.sin(t*1.7)*Math.sin(t*0.61+1.2));
      if (machine){ if (sampled) energy = q(d, LEVELS); }
      else energy = lerp(energy, d, reduce?1:0.09);
    }
    // machine mode reads cooler — less filament, more emitter
    warmth = lerp(warmth, (machine?0.28:1) * (state==='speaking'?1 : state==='idle'?0.18 : 0.6), machine?1:0.05);

    const baseGap = Math.min(26, W/(BARS+8));
    const step = baseGap*(0.66+0.52*s.wide);
    const span = step*(BARS-1);
    const x0 = cx - span/2;
    const lipY = H*0.40 + s.open*16;
    const maxH = Math.min(H*0.44,240)*(0.22+s.open);
    const ripple = state==='speaking' ? (machine?0.18:0.34) : state==='listening' ? 1 : 0.3;

    ctx.clearRect(0,0,W,H);

    const mouthY = lipY + maxH*0.45*energy;
    const bloom = (0.06+energy*0.20)*(0.35+warmth*0.65)*(machine?0.7:1);
    const glowRGB = machine ? '214,232,245' : '245,216,166';
    let g=ctx.createRadialGradient(cx,mouthY,0,cx,mouthY,Math.max(140,span*0.34));
    g.addColorStop(0,`rgba(${glowRGB},${bloom})`); g.addColorStop(.45,`rgba(${glowRGB},${bloom*0.26})`);
    g.addColorStop(1,`rgba(${glowRGB},0)`);
    ctx.globalCompositeOperation='lighter'; ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    ctx.save(); ctx.translate(cx,H*0.92); ctx.scale(1,0.12);
    const fg=ctx.createRadialGradient(0,0,0,0,0,span*0.42);
    fg.addColorStop(0,`rgba(255,250,240,${bloom*0.9})`); fg.addColorStop(1,'rgba(255,250,240,0)');
    ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(0,0,span*0.42,0,Math.PI*2); ctx.fill(); ctx.restore();
    ctx.globalCompositeOperation='source-over';

    ctx.lineCap = machine ? 'butt' : 'round';               // squared ends read as pixels
    ctx.lineWidth = Math.max(2.2, baseGap*(machine?0.17:0.135));

    const c=(BARS-1)/2, unit = maxH/ROWS;
    for (let i=0;i<BARS;i++){
      const b=bars[i];
      const idx = glitching ? (i*7 + ((glitchSeed)|0)) % BARS : i;   // scrambled addressing
      const u=(idx-c)/c;
      const top = lipY - s.smile*22*(u*u) + (machine?0:Math.sin(t*1.3+b.seed)*0.6);

      const hole = Math.exp(-Math.pow(u/0.30,2));
      const profile = lerp(taper(u), hole, s.round);

      const jit = machine
        ? 1 - ripple*q(0.5+0.5*Math.sin(t*b.rate+b.phase), 3)
        : 1 - ripple*0.32*(0.5+0.5*Math.sin(t*b.rate+b.phase))*(0.6+0.4*Math.sin(t*b.rate*0.37+b.seed*3));
      const target = profile*(0.30+0.70*energy)*jit;

      if (machine){ if (sampled || state==='speaking') b.v = target; }   // sample and hold
      else b.v = lerp(b.v, target, reduce?1:(state==='speaking'?0.34:0.20));

      let h = Math.max(1.4, b.v*maxH);
      if (machine) h = Math.max(unit*0.35, Math.round(h/unit)*unit);     // snap to the row grid

      const x = x0 + i*step;
      const core = profile;
      const alpha = machine
        ? (b.v > 0.02 ? q(0.30 + 0.70*Math.min(1,core*1.6), 4) : 0.14)   // stepped brightness
        : 0.22 + 0.78*Math.min(1, core*(0.55 + b.v*1.5));
      const mix = core*warmth;
      ctx.strokeStyle = machine
        ? `rgba(${Math.round(236+14*mix)},${Math.round(244+8*mix)},255,${alpha})`
        : `rgba(255,${Math.round(255-10*mix)},${Math.round(255-58*mix)},${alpha})`;
      ctx.shadowBlur = (machine?7:16)*core*warmth;
      ctx.shadowColor = machine ? 'rgba(200,225,255,.5)' : 'rgba(245,216,166,.55)';
      ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x, top+h); ctx.stroke();
    }
    ctx.shadowBlur=0;
    requestAnimationFrame(frame);
  }

  if (new URLSearchParams(location.search).has('billboard')) document.body.classList.add('billboard');
  fit(); statusEl.textContent=LABEL[state]; requestAnimationFrame(frame);
})();
</script>
</body>
</html>
